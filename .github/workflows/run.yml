name: Elite Content Factory

on:
  schedule:
    - cron: "*/10 * * * *"   # Poll stats setiap 10 min
    - cron: "0 */3 * * *"    # Search niche setiap 3 jam
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install google-api-python-client openai pandas
      - run: python main.py
